# Air-gapped embedded stack (plan phase 3).
#
# Runs Mike with NO external dependency: the Supabase data plane is embedded as
# three services (Postgres + GoTrue + PostgREST) behind an nginx gateway, plus
# MinIO (object storage), Redis (BullMQ), the app, and a local model server.
#
# Design notes:
#  - Supabase services trimmed to the 3 the app actually uses (see
#    docs/SELF_HOSTING_AIRGAPPED_PLAN.md §3). Realtime/Storage/Studio/etc dropped.
#  - Gateway is nginx, not Kong: the app only needs /auth/v1 + /rest/v1 routing;
#    the security boundary is JWT + deny-all RLS, not a gateway apikey gate. One
#    fewer service to own/patch.
#  - Boot ordering: postgres (creates roles) -> auth/GoTrue (creates auth.*) ->
#    migrate (app migrations, FK to auth.users) -> rest + gateway.
#  - Images pinned to the exact tags the working Supabase CLI stack uses. For a
#    true air-gap bundle, repin by @sha256 and vendor (phase 4).
#  - SECRETS BELOW ARE SUPABASE DEMO VALUES for local bring-up. A real deployment
#    MUST replace JWT_SECRET / ANON_KEY / SERVICE_ROLE_KEY / passwords via
#    gen-secrets (phase 5). Do not ship these.
#
# Only the gateway publishes a host port; everything else is compose-internal.

x-demo-jwt-secret: &jwt_secret "super-secret-jwt-token-with-at-least-32-characters-long"

services:
  postgres:
    image: public.ecr.aws/supabase/postgres:15.8.1.085
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # No host ports — internal only.

  db-init:
    # The supabase/postgres image creates the service roles but does NOT set
    # their login passwords to POSTGRES_PASSWORD, so GoTrue/PostgREST can't
    # authenticate on a fresh volume. Set them here (as the supabase_admin
    # superuser) before auth/rest start. In production, gen-secrets (phase 5)
    # supplies distinct passwords; this step aligns the roles to them.
    image: public.ecr.aws/supabase/postgres:15.8.1.085
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint: ["bash", "-c"]
    command:
      - >
        psql -h postgres -U supabase_admin -d postgres
        -c "alter role supabase_auth_admin with login password 'postgres';"
        -c "alter role authenticator with login password 'postgres';"
    restart: "no"

  auth:
    image: public.ecr.aws/supabase/gotrue:v2.191.0
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      API_EXTERNAL_URL: http://localhost:8000/auth/v1
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:postgres@postgres:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: *jwt_secret
      GOTRUE_JWT_ISSUER: http://gateway:8000/auth/v1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # Autoconfirm: no external SMTP needed on the critical path. Email-*change*
      # still needs a real relay (phase 5); catch-only via Mailpit otherwise.
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@mike.local
      GOTRUE_SMTP_SENDER_NAME: Mike
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    # Applies the app migrations AFTER GoTrue has created auth.*. Uses the api
    # image (node + pg + scripts/migrate.mjs + bundled supabase/migrations). Runs
    # once and exits 0; the gateway/api wait on its success.
    image: mike-api:airgapped
    depends_on:
      auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      MIGRATIONS_DIR: /app/supabase/migrations
    command: ["node", "apps/api/scripts/migrate.mjs"]
    restart: "no"

  rest:
    image: public.ecr.aws/supabase/postgrest:v14.13
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgresql://authenticator:postgres@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_JWT_SECRET: *jwt_secret
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # The single host-published ingress. Front with the TLS proxy in prod.
      - "8000:8000"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2026-05-06T00-18-40Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_UPDATE: "off"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # Console (9001) intentionally NOT host-published.

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "airgap-redis-pass"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "airgap-redis-pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # No host port.

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    # SMTP 1025 + UI 8025 internal only; front the UI behind the TLS proxy+auth.

volumes:
  pg_data:
  minio_data:
  redis_data:
