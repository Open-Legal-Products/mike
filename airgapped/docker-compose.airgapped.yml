# Air-gapped embedded stack (plan phase 3).
#
# Runs Mike with NO external dependency: the Supabase data plane is embedded as
# three services (Postgres + GoTrue + PostgREST) behind an nginx gateway, plus
# MinIO (object storage), Redis (BullMQ), the app, and a local model server.
#
# Design notes:
#  - Supabase services trimmed to the 3 the app actually uses (see
#    docs/SELF_HOSTING_AIRGAPPED_PLAN.md §3). Realtime/Storage/Studio/etc dropped.
#  - Gateway is nginx, not Kong: the app only needs /auth/v1 + /rest/v1 routing;
#    the security boundary is JWT + deny-all RLS, not a gateway apikey gate. One
#    fewer service to own/patch.
#  - Boot ordering: postgres (creates roles) -> auth/GoTrue (creates auth.*) ->
#    migrate (app migrations, FK to auth.users) -> rest + gateway.
#  - Images pinned to the exact tags the working Supabase CLI stack uses. For a
#    true air-gap bundle, repin by @sha256 and vendor (phase 4).
#  - ALL secrets are supplied via --env-file .env.generated (gen-secrets.sh);
#    there are NO demo defaults — `${VAR:?}` fails the boot if a secret is
#    missing, so the stack cannot accidentally ship on the Supabase demo secret.
#
# Only the gateway publishes a host port; everything else is compose-internal.

# Secrets come from --env-file .env.generated (gen-secrets.sh). `:?` fails the
# boot loudly if a required secret is missing — no demo defaults.

services:
  postgres:
    image: public.ecr.aws/supabase/postgres:15.8.1.085
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run gen-secrets.sh}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # No host ports — internal only.

  db-init:
    # The supabase/postgres image creates the service roles but does NOT set
    # their login passwords to POSTGRES_PASSWORD, so GoTrue/PostgREST can't
    # authenticate on a fresh volume. Set them here (as the supabase_admin
    # superuser) before auth/rest start. In production, gen-secrets (phase 5)
    # supplies distinct passwords; this step aligns the roles to them.
    image: public.ecr.aws/supabase/postgres:15.8.1.085
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?run gen-secrets.sh}
    entrypoint: ["bash", "-c"]
    command:
      - >
        psql -h postgres -U supabase_admin -d postgres
        -c "alter role supabase_auth_admin with login password '${POSTGRES_PASSWORD}';"
        -c "alter role authenticator with login password '${POSTGRES_PASSWORD}';"
    restart: "no"

  auth:
    image: public.ecr.aws/supabase/gotrue:v2.191.0
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      API_EXTERNAL_URL: http://localhost:8000/auth/v1
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: ${JWT_SECRET:?run gen-secrets.sh}
      GOTRUE_JWT_ISSUER: http://gateway:8000/auth/v1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # Autoconfirm signups: no external SMTP needed on the login/signup critical
      # path. Email-CHANGE is the only flow that sends mail; with no delivery its
      # confirmation link would only reach Mailpit (caught, not delivered), so
      # secure email change is OFF by default. An operator with an internal SMTP
      # relay sets SMTP_HOST/PORT/USER/PASS + SECURE_EMAIL_CHANGE=true to require
      # confirmation. Everything else works with no email at all.
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "${SECURE_EMAIL_CHANGE:-false}"
      GOTRUE_SMTP_HOST: "${SMTP_HOST:-mailpit}"
      GOTRUE_SMTP_PORT: "${SMTP_PORT:-1025}"
      GOTRUE_SMTP_USER: "${SMTP_USER:-}"
      GOTRUE_SMTP_PASS: "${SMTP_PASS:-}"
      GOTRUE_SMTP_ADMIN_EMAIL: "${SMTP_ADMIN_EMAIL:-admin@mike.local}"
      GOTRUE_SMTP_SENDER_NAME: Mike
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    # Applies the app migrations AFTER GoTrue has created auth.*. Uses the api
    # image (node + pg + scripts/migrate.mjs + bundled supabase/migrations). Runs
    # once and exits 0; the gateway/api wait on its success.
    image: mike-api:airgapped
    depends_on:
      auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      MIGRATIONS_DIR: /app/supabase/migrations
    command: ["node", "apps/api/scripts/migrate.mjs"]
    restart: "no"

  rest:
    image: public.ecr.aws/supabase/postgrest:v14.13
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_JWT_SECRET: ${JWT_SECRET:?run gen-secrets.sh}
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # The single host-published ingress. Front with the TLS proxy in prod.
      - "8000:8000"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2026-05-06T00-18-40Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?run gen-secrets.sh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?run gen-secrets.sh}
      MINIO_UPDATE: "off"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # Console (9001) intentionally NOT host-published.

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?run gen-secrets.sh}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    # No host port.

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    # SMTP 1025 + UI 8025 internal only; front the UI behind the TLS proxy+auth.

  ollama:
    image: ollama/ollama:0.6.8
    volumes:
      # Pre-pull the model into this volume in the bundle (phase 4); the API
      # points OPENAI_BASE_URL at http://ollama:11434/v1.
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # No host port — internal only.

  api:
    image: mike-api:airgapped
    depends_on:
      rest:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
    # All secrets + air-gap config come from the generated env file. The boot
    # guard (assertSecretsHardened) runs here and refuses demo/placeholder secrets.
    env_file: [.env.generated]
    environment:
      PORT: "3001"
    restart: unless-stopped

  web:
    image: mike-web:airgapped
    depends_on:
      api:
        condition: service_started
    env_file: [.env.generated]
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  redis_data:
  ollama_data:
