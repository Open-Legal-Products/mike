# nginx gateway for the embedded Supabase data plane.
# Routes the two prefixes supabase-js uses to the trimmed services, stripping the
# prefix. Passes Authorization + apikey through so PostgREST can resolve the JWT
# role (deny-all RLS is the real boundary). Replaces Kong for this stack.
server {
    listen 8000;
    server_name _;

    # GoTrue (auth). supabase-js calls {url}/auth/v1/*
    location /auth/v1/ {
        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PostgREST (REST). supabase-js calls {url}/rest/v1/*
    location /rest/v1/ {
        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Accept-Profile $http_accept_profile;
        proxy_set_header Content-Profile $http_content_profile;
        proxy_set_header Prefer $http_prefer;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
