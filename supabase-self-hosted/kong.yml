# Kong declarative configuration for Supabase self-hosted
# Routes /auth/* to GoTrue, /rest/v1/* to PostgREST

_format_version: "2.1"

consumers:
  - username: anon
    keyauth_credentials:
      - key: __ANON_KEY__
  - username: service_role
    keyauth_credentials:
      - key: __SERVICE_KEY__

services:
  # GoTrue (Auth)
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-all
        paths:
          - /auth/v1/
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-requested-with
          exposed_headers:
            - Content-Length
            - Content-Range
          credentials: true
          max_age: 3600

  # PostgREST
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-all
        paths:
          - /rest/v1/
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-requested-with
            - Range
            - Prefer
          exposed_headers:
            - Content-Length
            - Content-Range
          credentials: true
          max_age: 3600

# Global key-auth plugin
plugins:
  - name: key-auth
    config:
      hide_credentials: false
