<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mike Legal AI</title>
    <!-- Office.js must be loaded before any add-in code executes -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>
    <!-- Match the web app's typography (next/font Inter + EB Garamond). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- No universal reset here: un-layered CSS outranks every @layer rule,
         so a `* { margin: 0; padding: 0 }` in this file overrides ALL Tailwind
         margin/padding utilities. Tailwind's preflight (in @layer base)
         already provides the reset, at the right cascade priority. -->
    <style>
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- webpack HtmlWebpackPlugin injects the bundle script here -->
  </body>
</html>
