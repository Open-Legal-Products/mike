name: security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # `--audit-level=high` means: pass if only low/moderate advisories exist,
  # fail on high/critical. Auditing straight from the lockfile needs no
  # install, so this gate costs seconds.
  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Dependency security audit
        run: npm audit --audit-level=high

  backend-security-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint (security rules)
        run: npm run lint
