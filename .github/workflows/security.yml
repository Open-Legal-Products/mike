name: security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # `--audit-level=high` means: pass if only low/moderate advisories exist,
  # fail on high/critical. Auditing straight from the lockfile needs no
  # install, so this gate costs seconds.
  #
  # The backend (server-side attack surface) is blocking. The frontend job is
  # report-only for now: the sharp/next advisory chain (GHSA-f88m-g3jw-g9cj)
  # pre-dates this PR and has no non-breaking fix — `npm audit fix --force`
  # would downgrade to next@9. Dependabot (added in this PR) delivers the fix
  # when one exists; flip continue-on-error off once the chain clears.
  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    continue-on-error: ${{ matrix.workspace == 'frontend' }}
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Dependency security audit
        run: npm audit --audit-level=high

  backend-security-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint (security rules)
        run: npm run lint
