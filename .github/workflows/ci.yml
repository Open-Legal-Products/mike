name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: frontend
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend
      - name: Type check (tsc)
        run: npm run typecheck
        working-directory: frontend
      - name: Build (Next.js)
        run: npm run build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3001"
          NEXT_PUBLIC_AWS_REGION: "us-east-1"
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: "us-east-1_ciDev"
          NEXT_PUBLIC_COGNITO_CLIENT_ID: "ci-client"

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mike
          POSTGRES_USER: mike
          POSTGRES_PASSWORD: mike
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mike -d mike"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: backend
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: backend
      - name: Type check (tsc)
        run: npm run typecheck
        working-directory: backend
      - name: Build (tsc)
        run: npm run build
        working-directory: backend
      - name: Run Drizzle migrations
        run: npm run db:migrate
        working-directory: backend
        env:
          DATABASE_URL: postgres://mike:mike@localhost:5432/mike
